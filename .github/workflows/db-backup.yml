name: PostgreSQL Backup to B2

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  backup:
    name: Backup PostgreSQL to Backblaze B2
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL 18 client
        run: |
          # 최신 PostgreSQL 저장소 키 등록 (2024년 공식 방식)
          sudo apt-get install -y gnupg2 curl
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | \
            gpg --dearmor | \
            sudo tee /etc/apt/trusted.gpg.d/postgresql.gpg > /dev/null

          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | \
            sudo tee /etc/apt/sources.list.d/pgdg.list

          sudo apt-get update -qq

          # 설치 가능한 버전 목록 확인
          echo "=== 설치 가능한 버전 ==="
          apt-cache madison postgresql-client-18 2>/dev/null || echo "18 없음"
          apt-cache madison postgresql-client-17 2>/dev/null || echo "17 없음"
          echo "========================"

          # 버전 순서대로 시도
          sudo apt-get install -y postgresql-client-18 2>/dev/null || \
          sudo apt-get install -y postgresql-client-17 2>/dev/null || \
          sudo apt-get install -y postgresql-client-16

          pg_dump --version

      - name: Set timestamp and backup type
        id: meta
        run: |
          export TZ="Asia/Seoul"
          DATE=$(date '+%Y-%m-%d')
          TIME=$(date '+%H%M%S')
          DOW=$(date '+%u')
          DOM=$(date '+%d')

          PREFIX="daily"
          if [ "$DOM" = "01" ]; then
            PREFIX="monthly"
          elif [ "$DOW" = "7" ]; then
            PREFIX="weekly"
          fi

          FILENAME="photocafe-${DATE}-${TIME}.sql.gz"
          S3_KEY="${PREFIX}/${FILENAME}"

          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
          echo "s3_key=${S3_KEY}" >> $GITHUB_OUTPUT
          echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT
          echo "📦 Backup type: ${PREFIX}"
          echo "📁 S3 key: ${S3_KEY}"

      - name: Dump PostgreSQL database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🗄️  Starting pg_dump..."
          echo "🔗 Connecting to: ${DATABASE_URL//:*@/::****@}"

          # pg_dump 실행 (에러도 stdout으로 출력)
          set +e
          pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-privileges \
            --format=plain \
            --verbose \
            2>&1 | tee dump_with_log.txt | grep -v "^pg_dump:" | gzip -9 > "${{ steps.meta.outputs.filename }}"
          PG_EXIT=${PIPESTATUS[0]}
          set -e

          echo "=== pg_dump 전체 로그 ==="
          cat dump_with_log.txt
          echo "========================="
          echo "pg_dump exit code: ${PG_EXIT}"

          SIZE=$(du -h "${{ steps.meta.outputs.filename }}" | cut -f1)
          echo "Dump size: ${SIZE}"
          ls -lh "${{ steps.meta.outputs.filename }}"

          if [ "${PG_EXIT}" != "0" ]; then
            echo "❌ pg_dump failed with exit code ${PG_EXIT}"
            exit 1
          fi

      - name: Verify dump integrity
        run: |
          gzip -t "${{ steps.meta.outputs.filename }}"
          echo "✅ Gzip integrity OK"

          if zcat "${{ steps.meta.outputs.filename }}" | head -20 | grep -q "PostgreSQL database dump"; then
            echo "✅ SQL header looks valid"
          else
            echo "❌ SQL header missing — dump may be corrupted"
            exit 1
          fi

      - name: Upload to Backblaze B2 (S3 compatible)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          AWS_DEFAULT_REGION: us-east-005
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
          B2_BUCKET: ${{ secrets.B2_BUCKET_NAME }}
        run: |
          echo "☁️  Uploading to B2..."
          aws s3 cp \
            "${{ steps.meta.outputs.filename }}" \
            "s3://${B2_BUCKET}/${{ steps.meta.outputs.s3_key }}" \
            --endpoint-url "${B2_ENDPOINT}" \
            --no-progress
          echo "✅ Upload complete"

      - name: Summary
        if: always()
        run: |
          echo "### 📊 Backup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Type | \`${{ steps.meta.outputs.prefix }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| File | \`${{ steps.meta.outputs.filename }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Path | \`s3://${{ secrets.B2_BUCKET_NAME }}/${{ steps.meta.outputs.s3_key }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ steps.meta.outputs.filename }}" ]; then
            SIZE=$(du -h "${{ steps.meta.outputs.filename }}" | cut -f1)
            echo "| Size | ${SIZE} |" >> $GITHUB_STEP_SUMMARY
          fi
