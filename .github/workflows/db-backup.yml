name: DB 자동 백업

on:
  schedule:
    - cron: '0 18 * * *'  # 매일 새벽 3시 KST (UTC 18:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: DB 백업 실행
        uses: appleboy/ssh-action@v1.0.3
        env:
          SUDO_PASS: ${{ secrets.SSH_SUDO_PASS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          envs: SUDO_PASS
          script: |
            export SUDO_PASS="$SUDO_PASS"
            /volume1/docker/scripts/db-backup.sh

      - name: 백업 결과 요약
        if: always()
        run: |
          echo "## DB Backup Result" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC') (KST +9)" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
