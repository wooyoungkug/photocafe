name: PostgreSQL Backup to B2

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  backup:
    name: Backup PostgreSQL to Backblaze B2
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set timestamp and backup type
        id: meta
        run: |
          export TZ="Asia/Seoul"
          DATE=$(date '+%Y-%m-%d')
          TIME=$(date '+%H%M%S')
          DOW=$(date '+%u')
          DOM=$(date '+%d')

          PREFIX="daily"
          if [ "$DOM" = "01" ]; then
            PREFIX="monthly"
          elif [ "$DOW" = "7" ]; then
            PREFIX="weekly"
          fi

          FILENAME="photocafe-${DATE}-${TIME}.sql.gz"
          S3_KEY="${PREFIX}/${FILENAME}"

          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
          echo "s3_key=${S3_KEY}" >> $GITHUB_OUTPUT
          echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT
          echo "Backup type: ${PREFIX}"
          echo "S3 key: ${S3_KEY}"

      - name: Dump PostgreSQL database via Docker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Starting pg_dump via Docker postgres:18..."
          FILENAME="${{ steps.meta.outputs.filename }}"

          docker run --rm \
            -e PGPASSWORD="" \
            postgres:18 \
            pg_dump "${DATABASE_URL}" \
            --no-owner \
            --no-privileges \
            --format=plain \
            2>&1 | gzip -9 > "${FILENAME}"

          echo "=== 결과 확인 ===
