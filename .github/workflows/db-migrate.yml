name: DB Migration (Local → Railway Production)

# 로컬에서 작성한 SQL 덤프를 Railway Postgres 로 안전하게 적용합니다.
#
# 사용 방법:
#   1. 로컬에서 덤프 생성:
#        pg_dump -U postgres -d printing_erp \
#          --no-owner --no-privileges --format=plain \
#          > local_db_backup.sql
#   2. 본 저장소에 업로드(또는 별도 스토리지)하지 말고,
#      GitHub UI 의 "Run workflow" 입력란에 외부 스토리지 URL 을 지정하거나,
#      이미 Railway DB 에 접근 가능한 경로(예: B2 사전 서명 URL)를 입력합니다.
#   3. workflow_dispatch 로 수동 실행 (실수 방지 목적)
#
# 사전 요구사항 (GitHub Secrets):
#   - RAILWAY_DATABASE_URL : Railway Postgres 의 외부 Proxy URL
#       (Railway 대시보드 → Postgres → Connect → Public URL 복사)
#   - (선택) BACKUP_SOURCE_URL : 덤프 파일 사전 서명 URL

on:
  workflow_dispatch:
    inputs:
      dump_url:
        description: '복원할 SQL 덤프의 사전 서명 URL (.sql 또는 .sql.gz)'
        required: true
        type: string
      run_prisma_push:
        description: '복원 후 prisma db push 실행 여부'
        required: false
        type: boolean
        default: false
      take_backup_first:
        description: '복원 전 운영 DB 백업 (B2 업로드)'
        required: false
        type: boolean
        default: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      # ===========================================================
      # 1. 운영 DB 백업 (선택)
      # ===========================================================
      - name: Pre-migration backup to B2
        if: ${{ inputs.take_backup_first == true }}
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          AWS_DEFAULT_REGION: us-east-005
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
          B2_BUCKET: ${{ secrets.B2_BUCKET_NAME }}
        run: |
          export TZ="Asia/Seoul"
          TS=$(date '+%Y-%m-%d-%H%M%S')
          FILENAME="pre-migrate-${TS}.sql.gz"

          echo "=== 마이그레이션 전 운영 DB 백업 ==="
          pg_dump "$DATABASE_URL" --no-owner --no-privileges --format=plain \
            | gzip -9 > "${FILENAME}"

          ls -lh "${FILENAME}"

          aws s3 cp "${FILENAME}" \
            "s3://${B2_BUCKET}/pre-migrate/${FILENAME}" \
            --endpoint-url "${B2_ENDPOINT}" \
            --no-progress

          echo "백업 업로드 완료: pre-migrate/${FILENAME}"

      # ===========================================================
      # 2. 덤프 다운로드
      # ===========================================================
      - name: Download dump
        env:
          DUMP_URL: ${{ inputs.dump_url }}
        run: |
          echo "=== 덤프 다운로드 ==="
          curl -fsSL -o dump.raw "$DUMP_URL"
          ls -lh dump.raw

          if file dump.raw | grep -q gzip; then
            echo "Gzip 감지 - 압축 해제"
            gunzip -c dump.raw > dump.sql
          else
            mv dump.raw dump.sql
          fi

          ls -lh dump.sql
          head -3 dump.sql || true

      # ===========================================================
      # 3. Railway DB 에 복원
      # ===========================================================
      - name: Restore to Railway Postgres
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          echo "=== Railway Postgres 에 복원 ==="
          # ON_ERROR_STOP 으로 중간 실패 시 즉시 중단
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f dump.sql 2>&1 | tail -50
          echo "복원 완료"

      # ===========================================================
      # 4. Prisma 스키마 동기화 (선택)
      # ===========================================================
      - name: Prisma db push
        if: ${{ inputs.run_prisma_push == true }}
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          echo "=== Prisma 스키마 동기화 ==="
          cd apps/api
          npm ci --no-audit --no-fund
          npx prisma generate
          npx prisma db push --accept-data-loss
          echo "Prisma 동기화 완료"

      # ===========================================================
      # 5. 검증
      # ===========================================================
      - name: Verify
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          echo "=== 검증: 주요 테이블 row 수 ==="
          psql "$DATABASE_URL" -c "
            SELECT
              schemaname || '.' || relname AS table,
              n_live_tup AS rows
            FROM pg_stat_user_tables
            ORDER BY n_live_tup DESC
            LIMIT 20;
          "
