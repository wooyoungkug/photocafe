name: Deploy to Synology

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/wooyoungkug/photocafe-api
  WEB_IMAGE: ghcr.io/wooyoungkug/photocafe-web

jobs:
  # ===== Job 1: GitHub 러너에서 빌드 & GHCR Push =====
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & Push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://api:3001
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  # ===== Job 2: NAS에 배포 =====
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Deploy to Synology NAS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SUDO_PASS: ${{ secrets.SSH_SUDO_PASS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          envs: GHCR_TOKEN,SUDO_PASS
          script: |
            set -e

            # sudo wrapper for non-interactive session
            run_sudo() {
              echo "$SUDO_PASS" | sudo -S "$@"
            }

            echo "=========================================="
            echo "  Printing114 배포 시작"
            echo "  시각: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "=========================================="

            # 1. GHCR 로그인
            echo "=== [1/5] GHCR 로그인 ==="
            echo "$GHCR_TOKEN" | run_sudo docker login ghcr.io -u wooyoungkug --password-stdin

            # 2. 최신 이미지 Pull
            echo "=== [2/5] 이미지 Pull ==="
            run_sudo docker pull ghcr.io/wooyoungkug/photocafe-api:latest
            run_sudo docker pull ghcr.io/wooyoungkug/photocafe-web:latest

            # 3. 설정 파일 동기화
            echo "=== [3/5] 설정 동기화 ==="
            cd /volume1/docker
            git fetch origin main
            git checkout origin/main -- docker-compose.prod.yml

            # 4. 컨테이너 교체
            echo "=== [4/5] 컨테이너 교체 ==="
            run_sudo /usr/local/bin/docker-compose -f docker-compose.prod.yml stop api web 2>/dev/null || true
            run_sudo /usr/local/bin/docker-compose -f docker-compose.prod.yml rm -f api web 2>/dev/null || true
            run_sudo /usr/local/bin/docker-compose -f docker-compose.prod.yml up -d api web

            # 5. Health Check
            echo "=== [5/5] Health Check ==="
            for i in $(seq 1 24); do
              sleep 5
              if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
                echo "API 서버 준비 완료! ($((i*5))초)"
                break
              fi
              echo "대기 중... ($((i*5))초)"
              if [ "$i" = "24" ]; then
                echo "API 시작 타임아웃"
                run_sudo docker logs photocafe-api --tail 30
                exit 1
              fi
            done

            run_sudo docker ps --filter 'name=photocafe' --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

            # 오래된 이미지 정리
            run_sudo docker image prune -f

            echo "=========================================="
            echo "  배포 완료! $(date '+%Y-%m-%d %H:%M:%S')"
            echo "=========================================="

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
