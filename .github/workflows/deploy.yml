name: Deploy to Synology

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/wooyoungkug/photocafe-api
  WEB_IMAGE: ghcr.io/wooyoungkug/photocafe-web

jobs:
  # ===== Job 1: GitHub лҹ¬л„Ҳм—җм„ң л№Ңл“ң & GHCR Push =====
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & Push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=
            INTERNAL_API_URL=http://api:3001
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  # ===== Job 2: NASм—җ л°°нҸ¬ =====
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Deploy to Synology NAS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SUDO_PASS: ${{ secrets.SSH_SUDO_PASS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          envs: GHCR_TOKEN,SUDO_PASS
          script: |
            set -e

            # Synology NAS PATH м„Өм •
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            DOCKER="/usr/local/bin/docker"
            COMPOSE="/usr/local/bin/docker-compose"
            DEPLOY_DIR="/volume1/docker"

            # sudo wrapper for non-interactive session
            run_sudo() {
              echo "$SUDO_PASS" | sudo -S "$@"
            }

            echo "=========================================="
            echo "  Printing114 л°°нҸ¬ мӢңмһ‘"
            echo "  мӢңк°Ғ: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "=========================================="

            # 0. .env нҢҢмқј нҷ•мқё
            echo "=== [0/7] нҷҳкІҪм„Өм • нҷ•мқё ==="
            cd "$DEPLOY_DIR"
            if [ ! -f .env ]; then
              echo "ERROR: $DEPLOY_DIR/.env нҢҢмқјмқҙ м—ҶмҠөлӢҲлӢӨ!"
              echo "NASм—җ .env нҢҢмқјмқ„ лЁјм Җ мғқм„ұн•ҙмЈјм„ёмҡ”."
              exit 1
            fi
            # JWT_SECRET нҷ•мқё
            if ! grep -q "^JWT_SECRET=" .env; then
              echo "ERROR: .envм—җ JWT_SECRETмқҙ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ!"
              exit 1
            fi
            echo ".env нҷ•мқё мҷ„лЈҢ"

            # 1. GHCR лЎңк·ёмқё
            echo "=== [1/7] GHCR лЎңк·ёмқё ==="
            run_sudo $DOCKER login ghcr.io -u wooyoungkug --password "$GHCR_TOKEN"

            # 2. мөңмӢ  мқҙлҜём§Җ Pull (мһ¬мӢңлҸ„ лЎңм§Ғ нҸ¬н•Ё)
            echo "=== [2/7] мқҙлҜём§Җ Pull ==="
            pull_with_retry() {
              local image=$1
              local max_retries=3
              for attempt in $(seq 1 $max_retries); do
                echo "Pull $image (мӢңлҸ„ $attempt/$max_retries)..."
                if run_sudo $DOCKER pull "$image"; then
                  echo "$image pull м„ұкіө!"
                  return 0
                fi
                echo "Pull мӢӨнҢЁ. 10мҙҲ нӣ„ мһ¬мӢңлҸ„..."
                sleep 10
              done
              echo "ERROR: $image pull $max_retriesнҡҢ лӘЁл‘җ мӢӨнҢЁ!"
              return 1
            }
            pull_with_retry ghcr.io/wooyoungkug/photocafe-api:latest
            pull_with_retry ghcr.io/wooyoungkug/photocafe-web:latest

            # 3. м„Өм • нҢҢмқј лҸҷкё°нҷ”
            echo "=== [3/7] м„Өм • лҸҷкё°нҷ” ==="
            git fetch origin main
            git checkout origin/main -- docker-compose.prod.yml

            # 4. мқҙм „ л°©мӢқ м»Ён…Ңмқҙл„Ҳ м •лҰ¬ (printing114-api/web вҶ’ photocafe-api/web м „нҷҳ)
            echo "=== [4/7] мқҙм „ м»Ён…Ңмқҙл„Ҳ м •лҰ¬ ==="
            for OLD_NAME in printing114-api printing114-web; do
              OLD_RUNNING=$(run_sudo $DOCKER ps -q --filter "name=$OLD_NAME" 2>/dev/null || true)
              if [ -n "$OLD_RUNNING" ]; then
                echo "мқҙм „ м»Ён…Ңмқҙл„Ҳ $OLD_NAME мӨ‘м§Җ/м ңкұ°..."
                run_sudo $DOCKER stop "$OLD_NAME" 2>/dev/null || true
                run_sudo $DOCKER rm -f "$OLD_NAME" 2>/dev/null || true
              fi
            done

            # 5. DB м»Ён…Ңмқҙл„Ҳ нҷ•мқё (кұҙл“ңлҰ¬м§Җ м•Ҡкі  мғҒнғңл§Ң нҷ•мқё)
            echo "=== [5/7] DB мғҒнғң нҷ•мқё ==="
            DB_RUNNING=$(run_sudo $DOCKER ps --filter "name=photocafe-db" --filter "status=running" -q 2>/dev/null || true)
            if [ -z "$DB_RUNNING" ]; then
              echo "DB м»Ён…Ңмқҙл„Ҳк°Җ мӢӨн–ү мӨ‘мқҙ м•„лӢҷлӢҲлӢӨ. мӢңмһ‘н•©лӢҲлӢӨ..."
              run_sudo $COMPOSE --env-file .env -f docker-compose.prod.yml rm -f postgres 2>/dev/null || true
              run_sudo $COMPOSE --env-file .env -f docker-compose.prod.yml up -d postgres
              echo "DB мӢңмһ‘ лҢҖкё° (30мҙҲ)..."
              sleep 30
            else
              echo "DB м»Ён…Ңмқҙл„Ҳ м •мғҒ мӢӨн–ү мӨ‘"
            fi

            # 6. API/Web м»Ён…Ңмқҙл„Ҳл§Ң көҗмІҙ (--no-deps: DB кұҙл“ңлҰ¬м§Җ м•ҠмқҢ)
            echo "=== [6/7] м»Ён…Ңмқҙл„Ҳ көҗмІҙ (API + Web) ==="
            run_sudo $COMPOSE --env-file .env -f docker-compose.prod.yml stop api web 2>/dev/null || true
            run_sudo $COMPOSE --env-file .env -f docker-compose.prod.yml rm -f api web 2>/dev/null || true
            run_sudo $COMPOSE --env-file .env -f docker-compose.prod.yml up -d --no-deps api web

            # 7. Health Check
            echo "=== [7/7] Health Check ==="
            API_OK=false
            for i in $(seq 1 24); do
              sleep 5
              if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
                echo "API м„ңлІ„ мӨҖл№„ мҷ„лЈҢ! ($((i*5))мҙҲ)"
                API_OK=true
                break
              fi
              echo "лҢҖкё° мӨ‘... ($((i*5))мҙҲ)"
            done

            if [ "$API_OK" = "false" ]; then
              echo "API мӢңмһ‘ мӢӨнҢЁ. лЎңк·ё нҷ•мқё:"
              run_sudo $DOCKER logs photocafe-api --tail 50
              exit 1
            fi

            run_sudo $DOCKER ps --filter 'name=photocafe' --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

            # мҳӨлһҳлҗң мқҙлҜём§Җ м •лҰ¬
            run_sudo $DOCKER image prune -f

            echo "=========================================="
            echo "  л°°нҸ¬ мҷ„лЈҢ! $(date '+%Y-%m-%d %H:%M:%S')"
            echo "=========================================="

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
