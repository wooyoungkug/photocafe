name: Deploy to Synology

on:
  push:
    branches: [main]
  workflow_dispatch:

# 같은 브랜치에 새 push가 오면 진행 중인 빌드를 취소하고 최신만 실행
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/wooyoungkug/photocafe-api
  WEB_IMAGE: ghcr.io/wooyoungkug/photocafe-web

jobs:
  # ===== Job 1: GitHub 러너에서 빌드 & GHCR Push =====
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & Push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=
            INTERNAL_API_URL=http://api:3001
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  # ===== Job 2: NAS에 배포 =====
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Deploy to Synology NAS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SUDO_PASS: ${{ secrets.SSH_SUDO_PASS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          envs: GHCR_TOKEN,SUDO_PASS
          script: |
            set -e

            # Synology NAS PATH 설정
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            DOCKER="/usr/local/bin/docker"
            COMPOSE="/usr/local/bin/docker-compose"
            DEPLOY_DIR="/volume1/docker"

            # sudo wrapper for non-interactive session
            run_sudo() {
              echo "$SUDO_PASS" | sudo -S "$@"
            }

            echo "=========================================="
            echo "  Printing114 배포 시작"
            echo "  시각: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "=========================================="

            # 0-1. 배포 전 DB 백업 (데이터 손실 방지)
            echo "=== [0/8] 배포 전 DB 백업 ==="
            export SUDO_PASS="$SUDO_PASS"
            /volume1/docker/scripts/db-backup.sh || echo "백업 실패 - 계속 진행"

            # 0-2. .env 파일 확인
            echo "=== [1/8] 환경설정 확인 ==="
            cd "$DEPLOY_DIR"
            if [ ! -f .env ]; then
              echo "ERROR: $DEPLOY_DIR/.env 파일이 없습니다!"
              echo "NAS에 .env 파일을 먼저 생성해주세요."
              exit 1
            fi
            # JWT_SECRET 확인
            if ! grep -q "^JWT_SECRET=" .env; then
              echo "ERROR: .env에 JWT_SECRET이 설정되지 않았습니다!"
              exit 1
            fi
            echo ".env 확인 완료"

            # 1. GHCR 로그인
            echo "=== [2/8] GHCR 로그인 ==="
            run_sudo $DOCKER login ghcr.io -u wooyoungkug --password "$GHCR_TOKEN"

            # 2. 최신 이미지 Pull (재시도 로직 포함)
            echo "=== [3/8] 이미지 Pull ==="
            pull_with_retry() {
              local image=$1
              local max_retries=3
              for attempt in $(seq 1 $max_retries); do
                echo "Pull $image (시도 $attempt/$max_retries)..."
                if run_sudo $DOCKER pull "$image"; then
                  echo "$image pull 성공!"
                  return 0
                fi
                echo "Pull 실패. 10초 후 재시도..."
                sleep 10
              done
              echo "ERROR: $image pull $max_retries회 모두 실패!"
              return 1
            }
            pull_with_retry ghcr.io/wooyoungkug/photocafe-api:latest
            pull_with_retry ghcr.io/wooyoungkug/photocafe-web:latest

            # 3. 설정 파일 동기화
            echo "=== [4/8] 설정 동기화 ==="
            git fetch origin main
            git checkout origin/main -- docker-compose.prod.yml

            # 4. 이전 방식 컨테이너 정리 (printing114-api/web → photocafe-api/web 전환)
            echo "=== [5/8] 이전 컨테이너 정리 ==="
            for OLD_NAME in printing114-api printing114-web; do
              OLD_RUNNING=$(run_sudo $DOCKER ps -q --filter "name=$OLD_NAME" 2>/dev/null || true)
              if [ -n "$OLD_RUNNING" ]; then
                echo "이전 컨테이너 $OLD_NAME 중지/제거..."
                run_sudo $DOCKER stop "$OLD_NAME" 2>/dev/null || true
                run_sudo $DOCKER rm -f "$OLD_NAME" 2>/dev/null || true
              fi
            done

            # 5. DB 컨테이너 확인 (건드리지 않고 상태만 확인)
            echo "=== [6/8] DB 상태 확인 ==="
            DB_RUNNING=$(run_sudo $DOCKER ps --filter "name=photocafe-db" --filter "status=running" -q 2>/dev/null || true)
            if [ -z "$DB_RUNNING" ]; then
              echo "DB 컨테이너가 실행 중이 아닙니다. 시작합니다..."
              run_sudo $COMPOSE --env-file .env -f docker-compose.prod.yml rm -f postgres 2>/dev/null || true
              run_sudo $COMPOSE --env-file .env -f docker-compose.prod.yml up -d postgres
              echo "DB 시작 대기 (30초)..."
              sleep 30
            else
              echo "DB 컨테이너 정상 실행 중"
            fi

            # 6. API/Web 컨테이너만 교체 (--no-deps: DB 건드리지 않음)
            echo "=== [7/8] 컨테이너 교체 (API + Web) ==="
            run_sudo $COMPOSE --env-file .env -f docker-compose.prod.yml stop api web 2>/dev/null || true
            run_sudo $COMPOSE --env-file .env -f docker-compose.prod.yml rm -f api web 2>/dev/null || true
            run_sudo $COMPOSE --env-file .env -f docker-compose.prod.yml up -d --no-deps api web

            # 7. Health Check
            echo "=== [8/8] Health Check ==="
            API_OK=false
            for i in $(seq 1 24); do
              sleep 5
              if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
                echo "API 서버 준비 완료! ($((i*5))초)"
                API_OK=true
                break
              fi
              echo "대기 중... ($((i*5))초)"
            done

            if [ "$API_OK" = "false" ]; then
              echo "API 시작 실패. 로그 확인:"
              run_sudo $DOCKER logs photocafe-api --tail 50
              exit 1
            fi

            run_sudo $DOCKER ps --filter 'name=photocafe' --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

            # 오래된 이미지 정리
            run_sudo $DOCKER image prune -f

            echo "=========================================="
            echo "  배포 완료! $(date '+%Y-%m-%d %H:%M:%S')"
            echo "=========================================="

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
